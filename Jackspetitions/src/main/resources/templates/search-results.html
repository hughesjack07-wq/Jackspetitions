<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Petitions</title>
</head>
<body>
<h1>Search for a Petition</h1>
<form th:action="@{/search}" method="get">
    <input type="text" name="query" placeholder="Enter petition title...">
    <button type="submit">Search</button>
</form>

<div th:if="${results != null}">
    <h2>Results</h2>
    <ul>
        <li th:each="p : ${results}">
            <a th:href="@{/view/{id}(id=${p.id})}" th:text="${p.title}"></a>
        </li>
    </ul>
</div>
<br>
<a th:href="@{/}">Back to List</a>
</body>
</html>
